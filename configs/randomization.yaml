# Domain randomization ranges, applied per episode before recording, to bridge
# the sim->real visual/dynamics gap. Centers come from configs/scene.yaml.

enabled: true

lighting:
  diffuse: [0.45, 0.9]    # per-light diffuse scalar (applied to r=g=b)
  ambient: [0.1, 0.4]     # global ambient scalar
  pos_jitter: [0.25, 0.25, 0.15]   # +/- metres on each light position

# Per-channel additive jitter (+/-) around the scene.yaml base colours, clipped
# to [0,1]. Kept small enough that red stays red and blue stays blue.
color_jitter:
  cube: 0.07
  cup: 0.10
  table: 0.06
  wall: 0.05

camera:
  # Applied ONCE per episode (static within an episode). The sim front camera
  # can never match the real C920 exactly, so a single fixed viewpoint makes the
  # vision features brittle and they don't transfer. The real lab camera sits
  # HIGHER than the sim default (0.58 m), and that height is uncertain, so we
  # jitter the z (height) generously to span it while keeping x/y/aim/FOV jitter
  # very small (the mount is roughly overhead-centred).
  front:
    pos_jitter: [0.005, 0.005, 0.10]     # x, y tiny; z (height) large -> ~0.48..0.68 m
    lookat_jitter: [0.005, 0.005, 0.0]
    fovy_jitter: 1.5
  wrist:
    pos_jitter: [0.006, 0.006, 0.006]
    fovy_jitter: 5.0

physics:
  cube_friction: [0.6, 1.2]     # tangential friction sampled per episode
  cube_mass_scale: [0.8, 1.3]   # multiplies the nominal cube mass

# Gaussian noise added to recorded proprioceptive state / actions (degrees,
# gripper units). Raised from 0.5 so the joint state is a less reliable predictor
# of the action -> the policy is pushed to read the cameras instead of replaying
# a trajectory keyed off proprioception (the shortcut behind the mode collapse).
observation_noise_deg: 2.5
action_noise_deg: 0.0

# Sensor-dropout augmentation: with this probability, a recorded frame's
# observation.state is zeroed entirely, so the policy cannot rely on
# proprioception being present and must ground its action in the cameras. The
# real arm always sends valid state at inference, so this only removes the crutch
# during training. Applied per frame in data/record.py.
state_dropout_prob: 0.2
