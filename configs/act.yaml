# ACT training hyperparameters (documentation; scripts/train_act.sh passes these
# as lerobot-train CLI flags). ACT is the primary policy for this repo.
#
# ACT auto-detects its input/output features from the dataset:
#   inputs : observation.images.front, observation.images.wrist, observation.state (6)
#   output : action (6)  -- absolute joint targets in LeRobot calibrated units.
# No camera renaming is needed (unlike SmolVLA).

policy:
  type: act
  chunk_size: 100          # action chunk ACT predicts
  n_action_steps: 100      # steps executed before replanning
  n_obs_steps: 1
  vision_backbone: resnet18
  dim_model: 512
  n_heads: 8
  device: cuda

training:
  steps: 100000
  batch_size: 8
  save_freq: 5000
  log_freq: 200
  seed: 42

dataset:
  repo_id: sim/sim_redcubes_bluecup
  root: recordings/sim_redcubes_bluecup
  fps: 30
